<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
  <title>FirmWriter</title>
</head>
<body>

<div class="container">
  <img src="Logo.png" alt="Logo">

  <div class="bloques-grid">
    <div class="bloque">
      <h3 class="bloque-titulo">Firmware</h3>
      <div class="fila">
        <div class="file-picker">
          <input type="file" id="fileFirm">
          <button type="button" class="btn-file" onclick="document.getElementById('fileFirm').click()">Seleccionar</button>
          <span class="file-name" id="fileFirmLabel">Ningún archivo</span>
        </div>
        <button onclick="subirArchivo('fileFirm', '/upload/firms', 'comboFirm')">Subir Firm</button>
      </div>
      <div class="fila">
        <label>Elegir Firm:</label>
        <select id="comboFirm"></select>
      </div>
    </div>

    <div class="bloque">
      <h3 class="bloque-titulo">Imagen</h3>
      <div class="fila">
        <div class="file-picker">
          <input type="file" id="fileImagen">
          <button type="button" class="btn-file" onclick="document.getElementById('fileImagen').click()">Seleccionar</button>
          <span class="file-name" id="fileImagenLabel">Ningún archivo</span>
        </div>
        <button onclick="subirArchivo('fileImagen', '/upload/imagenes', 'comboImagen')">Subir Imagen</button>
      </div>
      <div class="fila">
        <label>Elegir Imagen:</label>
        <select id="comboImagen"></select>
      </div>
    </div>

    <div class="bloque">
      <h3 class="bloque-titulo">Script</h3>
      <div class="fila">
        <div class="file-picker">
          <input type="file" id="fileScript">
          <button type="button" class="btn-file" onclick="document.getElementById('fileScript').click()">Seleccionar</button>
          <span class="file-name" id="fileScriptLabel">Ningún archivo</span>
        </div>
        <button onclick="subirArchivo('fileScript', '/upload/scripts', 'comboScript')">Subir Script</button>
      </div>
      <div class="fila">
        <label>Elegir Script:</label>
        <select id="comboScript"></select>
      </div>
    </div>

    <div class="bloque">
      <h3 class="bloque-titulo">Acciones</h3>
      <div class="botones-principales">
        <button class="boton-grande" onclick="subirTodo()">Subir Firm e Imagen</button>
        <button class="boton-grande" onclick="descargarArchivos()">Descargar archivos</button>
        <a href="/verdatos.html" style="text-decoration:none;">
          <button class="boton-grande">Visualizar Grabados</button>
        </a>
      </div>
    </div>
  </div>

  <footer>
    FirmWriter by Maty ppc tools <span style="color:#EF4444; font-weight:bold;">*nunca publicar esta página en internet!!</span>
  </footer>
</div>

<div id="progresoModal" class="modal">
  <div class="modal-header">
    <span class="icono-modal">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20l3-3"/><path d="M14 4l3-3"/><path d="M6 14l4-4"/><path d="M8 12l2-2"/><path d="M20 2l-4 4"/><circle cx="12" cy="12" r="3"/><path d="M12 15v3"/><path d="M9 18h6"/></svg>
      Progreso de subida
    </span>
    <button onclick="cerrarModal()" aria-label="Cerrar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-contenido">
    <pre id="resultadoTexto">Iniciando proceso...</pre>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
