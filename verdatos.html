<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
  <title>Visualizador de Dispositivos</title>
</head>
<body>
  <div class="container">
    <img src="Logo.png" alt="Logo">
    <h1>Visualizador de Dispositivos</h1>

    <div class="bloque">
      <h3 class="bloque-titulo">Opciones</h3>
      <div class="fila">
        <button onclick="recargar()" class="boton-recargar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Recargar datos
        </button>
        <button onclick="descargarCSV()" class="boton-recargar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar
        </button>
        <button onclick="volverAlGestor()" class="boton-recargar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Volver al Gestor
        </button>
      </div>
    </div>

    <div id="contenedorCSVs">
      <div style="text-align:center; padding:48px; color:#6B7280;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Cargando archivos CSV...
      </div>
    </div>

    <footer>FirmWriter by Maty ppc tools | Visualizador de Dispositivos</footer>
  </div>

  <script src="/verdatos.js"></script>
</body>
</html>
